# Golden Years Club — Automated Scraper Schedule
#
# Keeps animal listings and shelter data fresh by running
# scraper pipelines on staggered cron schedules.
#
# Schedule A (:00) — Petfinder(8) + Adopt-a-Pet(8) + RescueGroups(1) + Socrata(1) = 18 concurrent
# Schedule B (:30) — Petango(4) + ShelterLuv(4) = 8 concurrent
# Peak concurrent: 18 jobs (within free-tier limit of 20)
#
# Required repository secrets:
#   DATABASE_URL        — Railway PostgreSQL connection string
#   GEMINI_API_KEY      — Google Gemini for CV age estimation
#   RESCUE_GROUPS_API_KEY — RescueGroups.org API key

name: Scrape

on:
  # ── Cron Schedules ──────────────────────────────────────
  schedule:
    # Daily backup before scrapes
    - cron: '45 1 * * *'            # 1:45am UTC — pre-scrape backup
    # Group A: Petfinder + Adopt-a-Pet + RescueGroups + Socrata (3x/day)
    - cron: '0 2,10,18 * * *'       # 2am, 10am, 6pm UTC
    # Group B: Petango + ShelterLuv (3x/day, offset 30min)
    - cron: '30 2,10,18 * * *'      # 2:30am, 10:30am, 6:30pm UTC
    # Open data stats: weekly on Sunday at 4am UTC
    - cron: '0 4 * * 0'
    # Breed DB + shelter stats: 1st of every month at 5am UTC
    - cron: '0 5 1 * *'
    # Best Friends dashboard: annually on Jan 15 at 6am UTC
    - cron: '0 6 15 1 *'

  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      pipeline:
        description: 'Which pipeline to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backup
          - shelters
          - rescuegroups
          - petfinder
          - petango
          - shelterluv
          - adoptapet
          - socrata-listings
          - opendata
          - breeds
          - shelter-stats
          - new-jersey
          - connecticut
          - maryland
          - michigan
          - south-carolina
          - state-reports
          - illinois
          - missouri
          - oregon
          - florida
          - georgia
          - virginia
          - 990
          - aldf
          - colorado
          - north-carolina
          - geocode
          - enrich
          - best-friends

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  RESCUE_GROUPS_API_KEY: ${{ secrets.RESCUE_GROUPS_API_KEY }}

jobs:
  # ── Daily Database Backup (1:45 UTC, before scrapers) ───
  backup-db:
    if: >-
      github.event.schedule == '45 1 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'backup'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Create backup
        run: |
          TIMESTAMP=$(date +%Y-%m-%d-%H%M%S)
          BACKUP_FILE="golden-years-${TIMESTAMP}.sql.gz"
          echo "📦 Backing up database → ${BACKUP_FILE}"
          pg_dump "$DATABASE_URL" \
            --no-owner \
            --no-privileges \
            --format=plain \
            --verbose 2>&1 | gzip > "${BACKUP_FILE}"
          du -h "${BACKUP_FILE}"
          echo "BACKUP_FILE=${BACKUP_FILE}" >> "$GITHUB_ENV"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30

  # ── Shelter Scrapers (every 8 hours) ────────────────────
  scrape-shelters:
    if: >-
      github.event.schedule == '0 2,10,18 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'shelters'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npm run scrape

  # ── RescueGroups (every 8 hours) ────────────────────────
  scrape-rescuegroups:
    if: >-
      github.event.schedule == '0 2,10,18 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'rescuegroups'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx tsx scraper/run-rescuegroups.ts

  # ── Petfinder (every 8 hours, 4 parallel shards) ───────
  scrape-petfinder:
    if: >-
      github.event.schedule == '0 2,10,18 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'petfinder'))
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx tsx scraper/run-petfinder.ts --shard=${{ matrix.shard }} --total-shards=8

  # ── Petango / 24PetConnect (every 8 hours) ──────────────
  scrape-petango:
    if: >-
      github.event.schedule == '30 2,10,18 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'petango'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx tsx scraper/run-petango.ts --shard=${{ matrix.shard }} --total-shards=4

  # ── Socrata Listings (every 8 hours) ────────────────────
  scrape-socrata-listings:
    if: >-
      github.event.schedule == '0 2,10,18 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'socrata-listings'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx tsx scraper/run-socrata-listings.ts

  # ── ShelterLuv (every 8 hours) ─────────────────────────
  scrape-shelterluv:
    if: >-
      github.event.schedule == '30 2,10,18 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'shelterluv'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx tsx scraper/run-shelterluv.ts --shard=${{ matrix.shard }} --total-shards=4

  # ── Adopt-a-Pet (every 8 hours) ──────────────────────
  scrape-adoptapet:
    if: >-
      github.event.schedule == '0 2,10,18 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'adoptapet'))
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx tsx scraper/run-adoptapet.ts --shard=${{ matrix.shard }} --total-shards=8

  # ── Open Data Stats (weekly) ────────────────────────────
  scrape-stats:
    if: >-
      github.event.schedule == '0 4 * * 0' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'opendata'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate

      - name: Run open data pipeline
        run: npm run scrape:opendata

  # ── Breed DB + Shelter Stats (monthly) ──────────────────
  scrape-monthly:
    if: >-
      github.event.schedule == '0 5 1 * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'breeds' ||
        github.event.inputs.pipeline == 'shelter-stats' ||
        github.event.inputs.pipeline == 'new-jersey' ||
        github.event.inputs.pipeline == 'connecticut' ||
        github.event.inputs.pipeline == 'maryland' ||
        github.event.inputs.pipeline == 'michigan' ||
        github.event.inputs.pipeline == 'south-carolina' ||
        github.event.inputs.pipeline == 'illinois' ||
        github.event.inputs.pipeline == 'missouri' ||
        github.event.inputs.pipeline == 'oregon' ||
        github.event.inputs.pipeline == 'florida' ||
        github.event.inputs.pipeline == 'georgia' ||
        github.event.inputs.pipeline == 'virginia' ||
        github.event.inputs.pipeline == 'colorado' ||
        github.event.inputs.pipeline == 'north-carolina' ||
        github.event.inputs.pipeline == '990' ||
        github.event.inputs.pipeline == 'aldf' ||
        github.event.inputs.pipeline == 'geocode' ||
        github.event.inputs.pipeline == 'enrich' ||
        github.event.inputs.pipeline == 'state-reports'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate

      - name: Run breed database
        if: >-
          github.event.schedule == '0 5 1 * *' ||
          github.event.inputs.pipeline == 'all' ||
          github.event.inputs.pipeline == 'breeds'
        run: npm run scrape:breeds

      - name: Run shelter stats
        if: >-
          github.event.schedule == '0 5 1 * *' ||
          github.event.inputs.pipeline == 'all' ||
          github.event.inputs.pipeline == 'shelter-stats'
        run: npm run scrape:shelter-stats

      - name: Run New Jersey state data
        if: >-
          github.event.schedule == '0 5 1 * *' ||
          github.event.inputs.pipeline == 'all' ||
          github.event.inputs.pipeline == 'new-jersey' ||
          github.event.inputs.pipeline == 'state-reports'
        run: npm run scrape:new-jersey

      - name: Run Connecticut state data
        if: >-
          github.event.schedule == '0 5 1 * *' ||
          github.event.inputs.pipeline == 'all' ||
          github.event.inputs.pipeline == 'connecticut' ||
          github.event.inputs.pipeline == 'state-reports'
        run: npm run scrape:connecticut

      - name: Run Maryland state data
        if: >-
          github.event.schedule == '0 5 1 * *' ||
          github.event.inputs.pipeline == 'all' ||
          github.event.inputs.pipeline == 'maryland' ||
          github.event.inputs.pipeline == 'state-reports'
        run: npm run scrape:maryland

      - name: Run Michigan state data
        if: >-
          github.event.schedule == '0 5 1 * *' ||
          github.event.inputs.pipeline == 'all' ||
          github.event.inputs.pipeline == 'michigan' ||
          github.event.inputs.pipeline == 'state-reports'
        run: npm run scrape:michigan

      - name: Run South Carolina state data
        if: >-
          github.event.schedule == '0 5 1 * *' ||
          github.event.inputs.pipeline == 'all' ||
          github.event.inputs.pipeline == 'south-carolina' ||
          github.event.inputs.pipeline == 'state-reports'
        run: npm run scrape:south-carolina

      - name: Run Illinois state data
        if: >-
          github.event.schedule == '0 5 1 * *' ||
          github.event.inputs.pipeline == 'all' ||
          github.event.inputs.pipeline == 'illinois' ||
          github.event.inputs.pipeline == 'state-reports'
        run: npm run scrape:illinois

      - name: Run Missouri state data
        if: >-
          github.event.schedule == '0 5 1 * *' ||
          github.event.inputs.pipeline == 'all' ||
          github.event.inputs.pipeline == 'missouri' ||
          github.event.inputs.pipeline == 'state-reports'
        run: npm run scrape:missouri

      - name: Run Oregon state data
        if: >-
          github.event.schedule == '0 5 1 * *' ||
          github.event.inputs.pipeline == 'all' ||
          github.event.inputs.pipeline == 'oregon' ||
          github.event.inputs.pipeline == 'state-reports'
        run: npm run scrape:oregon

      - name: Run Florida state data
        if: >-
          github.event.schedule == '0 5 1 * *' ||
          github.event.inputs.pipeline == 'all' ||
          github.event.inputs.pipeline == 'florida' ||
          github.event.inputs.pipeline == 'state-reports'
        run: npm run scrape:florida

      - name: Run Georgia state data
        if: >-
          github.event.schedule == '0 5 1 * *' ||
          github.event.inputs.pipeline == 'all' ||
          github.event.inputs.pipeline == 'georgia' ||
          github.event.inputs.pipeline == 'state-reports'
        run: npm run scrape:georgia

      - name: Run Virginia VDACS data
        if: >-
          github.event.schedule == '0 5 1 * *' ||
          github.event.inputs.pipeline == 'all' ||
          github.event.inputs.pipeline == 'virginia' ||
          github.event.inputs.pipeline == 'state-reports'
        run: npm run scrape:virginia

      - name: Run Colorado state data
        if: >-
          github.event.schedule == '0 5 1 * *' ||
          github.event.inputs.pipeline == 'all' ||
          github.event.inputs.pipeline == 'colorado' ||
          github.event.inputs.pipeline == 'state-reports'
        run: npm run scrape:colorado

      - name: Run North Carolina state data
        if: >-
          github.event.schedule == '0 5 1 * *' ||
          github.event.inputs.pipeline == 'all' ||
          github.event.inputs.pipeline == 'north-carolina' ||
          github.event.inputs.pipeline == 'state-reports'
        run: npm run scrape:north-carolina

      - name: Run IRS 990 financial data
        if: >-
          github.event.schedule == '0 5 1 * *' ||
          github.event.inputs.pipeline == 'all' ||
          github.event.inputs.pipeline == '990'
        run: npm run scrape:990

      - name: Run ALDF state rankings
        if: >-
          github.event.schedule == '0 5 1 * *' ||
          github.event.inputs.pipeline == 'all' ||
          github.event.inputs.pipeline == 'aldf'
        run: npm run scrape:aldf

      - name: Geocode shelters
        if: >-
          github.event.schedule == '0 5 1 * *' ||
          github.event.inputs.pipeline == 'all' ||
          github.event.inputs.pipeline == 'geocode'
        run: npm run geocode

      - name: Compute enrichments
        if: >-
          github.event.schedule == '0 5 1 * *' ||
          github.event.inputs.pipeline == 'all' ||
          github.event.inputs.pipeline == 'enrich'
        run: npm run enrich

  # ── Best Friends Dashboard (annual, Jan 15) ─────────────
  scrape-best-friends:
    if: >-
      github.event.schedule == '0 6 15 1 *' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.pipeline == 'best-friends')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx playwright install chromium --with-deps
      - run: npm run scrape:best-friends

  # ── Retry Queue (after all 8h scrape jobs) ──────────────
  retry-queue:
    needs: [scrape-shelters, scrape-rescuegroups, scrape-petfinder, scrape-petango, scrape-socrata-listings, scrape-shelterluv, scrape-adoptapet]
    if: always() && github.event.schedule == '0 2,10,18 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx tsx scraper/run-retry.ts

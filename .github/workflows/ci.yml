# Golden Years Club — CI Pipeline
#
# Runs build + unit tests on every push and PR.
# Prevents broken builds from deploying to Railway.

name: CI

on:
  push:
    branches: [main, staging]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'public/mascots/**'
      - 'LICENSE'
      - '.github/workflows/scrape.yml'
      - '.github/workflows/health-check.yml'
  pull_request:
    branches: [main, staging]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'public/mascots/**'
      - 'LICENSE'
      - '.github/workflows/scrape.yml'
      - '.github/workflows/health-check.yml'

# Cancel in-progress CI runs on the same branch — saves minutes on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Type check + build
        run: npm run build
        env:
          # Build needs DATABASE_URL shape but won't connect
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

      - name: Unit tests
        run: npx vitest run

      - name: Performance anti-pattern check
        run: npx tsx scripts/perf-check.ts

# Golden Years Club — Staging Migration Check
#
# Runs Prisma migrations against the staging database on push to `staging`.
# Railway handles the actual deployment automatically via GitHub integration.
#
# Prerequisites:
#   1. Create a GitHub environment called "staging"
#   2. Add this secret to the staging environment:
#      - DATABASE_URL — staging PostgreSQL connection string

name: Deploy Staging

on:
  push:
    branches: [staging]

# Prevent overlapping staging deploys
concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

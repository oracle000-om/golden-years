# Shared setup for all Golden Years workflows.
# Handles Node.js install (with node_modules cache) and Prisma client generation.
#
# IMPORTANT: The calling job must run `actions/checkout@v4` BEFORE using
# this composite action, because GitHub needs the repo checked out to
# find local action definitions.

name: Setup Environment
description: Install deps with caching and generate Prisma client

inputs:
  install-playwright:
    description: Install Playwright Chromium + system deps
    required: false
    default: 'false'
  install-python:
    description: Install Python 3.11 + embedding worker deps (torch, pymilvus)
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 22

    # Cache node_modules directly — much faster than npm cache alone.
    # npm ci still validates against package-lock.json on cache miss.
    - name: Cache node_modules
      id: cache-deps
      uses: actions/cache@v4
      with:
        path: node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

    - name: Install dependencies
      if: steps.cache-deps.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci

    # Cache generated Prisma client — deterministic based on schema
    - name: Cache Prisma client
      id: cache-prisma
      uses: actions/cache@v4
      with:
        path: node_modules/.prisma
        key: prisma-${{ runner.os }}-${{ hashFiles('prisma/schema.prisma') }}

    - name: Generate Prisma client
      if: steps.cache-prisma.outputs.cache-hit != 'true'
      shell: bash
      run: npx prisma generate

    - name: Install Playwright
      if: inputs.install-playwright == 'true'
      shell: bash
      run: npx playwright install chromium --with-deps

    # Python + venv for embedding worker (ResNet50 + Zilliz)
    - name: Set up Python
      if: inputs.install-python == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache Python venv
      if: inputs.install-python == 'true'
      id: cache-python
      uses: actions/cache@v4
      with:
        path: scraper/cv/.venv
        key: python-venv-${{ runner.os }}-${{ hashFiles('scraper/cv/requirements.txt') }}

    - name: Install Python deps
      if: inputs.install-python == 'true' && steps.cache-python.outputs.cache-hit != 'true'
      shell: bash
      run: |
        python -m venv scraper/cv/.venv
        source scraper/cv/.venv/bin/activate
        pip install -r scraper/cv/requirements.txt

# Golden Years Club — Automated Scraper Schedule
#
# Keeps animal listings and shelter data fresh by running
# scraper pipelines on staggered cron schedules.
#
# Schedule A (:00) — Shelters(1) + Petfinder(4) + Adopt-a-Pet(4) + RescueGroups(1) = 10 concurrent
# Schedule B (:30) — Petango(4) + ShelterLuv(4) = 8 concurrent
# Peak concurrent: 10 jobs (well within free-tier limit of 20)
# Frequency: 1x/day (6am UTC) — most shelters update once daily
#
# Data pipeline cadences:
#   1x/day   — Animal listings (shelters, petfinder, etc.)
#   Weekly   — Open data stats, Socrata listings, confiscation events
#   Monthly  — USDA inspections, state kennel records, shelter intake
#   Annual   — Research facility reports, Horrible Hundred, Beagle Bills
#
# Required repository secrets:
#   DATABASE_URL          — PostgreSQL connection string (Railway)
#   GEMINI_API_KEY        — Google Gemini for CV age estimation
#   RESCUE_GROUPS_API_KEY — RescueGroups.org API key

name: Scrape

on:
  # ── Cron Schedules ──────────────────────────────────────
  schedule:
    # Daily backup before scrapes
    - cron: '45 1 * * *'            # 1:45am UTC — pre-scrape backup
    # Group A: Petfinder + RescueGroups + Shelters (1x/day)
    - cron: '0 6 * * *'             # 6:00 UTC
    # Group B: Petango + ShelterLuv (1x/day, offset 30min)
    - cron: '30 6 * * *'            # 6:30 UTC
    # Group C: Adopt-a-Pet (1x/day, offset 60min to reduce connection pressure)
    - cron: '0 7 * * *'             # 7:00 UTC
    # Weekly: open data + Socrata listings + confiscation events (Sunday 4am UTC)
    - cron: '0 4 * * 0'
    # Monthly: inspections, state records, intake stats (1st of month, 5am UTC)
    - cron: '0 5 1 * *'
    # Annual: research reports, Horrible Hundred, Beagle Bills, Best Friends (Jan 15, 6am UTC)
    - cron: '0 6 15 1 *'

  # ── Manual Trigger ──────────────────────────────────────
  # Type a pipeline name to run just that one, or "all" to run everything.
  # Valid names: backup, shelters, rescuegroups, petfinder, petango,
  #   shelterluv, adoptapet, socrata-listings, opendata, breeds,
  #   shelter-stats, state-reports, new-jersey, connecticut, maryland,
  #   michigan, south-carolina, illinois, missouri, oregon, florida,
  #   georgia, virginia, colorado, north-carolina, 990, aldf,
  #   geocode, enrich, best-friends, aphis, aphis-enforcement,
  #   horrible-hundred, state-kennel, research, shelter-intake,
  #   confiscation, lab-retirement, news-busts, cruelty-registry,
  #   puppy-imports, pet-store-bans, annual
  workflow_dispatch:
    inputs:
      pipeline:
        description: 'Pipeline name (or "all")'
        required: true
        default: 'all'
        type: string

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  RESCUE_GROUPS_API_KEY: ${{ secrets.RESCUE_GROUPS_API_KEY }}
  ZILLIZ_ENDPOINT: ${{ secrets.ZILLIZ_ENDPOINT }}
  ZILLIZ_TOKEN: ${{ secrets.ZILLIZ_TOKEN }}
  PYTHON_CMD: scraper/cv/.venv/bin/python

jobs:
  # ── Daily Database Backup (1:45 UTC, before scrapers) ───
  backup-db:
    if: >-
      github.event.schedule == '45 1 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'backup'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Create backup
        run: |
          TIMESTAMP=$(date +%Y-%m-%d-%H%M%S)
          BACKUP_FILE="golden-years-${TIMESTAMP}.sql.gz"
          echo "📦 Backing up database → ${BACKUP_FILE}"
          pg_dump "$DATABASE_URL" \
            --no-owner \
            --no-privileges \
            --format=plain \
            --verbose 2>&1 | gzip > "${BACKUP_FILE}"
          du -h "${BACKUP_FILE}"
          echo "BACKUP_FILE=${BACKUP_FILE}" >> "$GITHUB_ENV"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90

      # Optional: upload to S3-compatible storage for long-term retention.
      # Activate by adding BACKUP_S3_BUCKET and AWS_* secrets.
      - name: Upload to cloud storage
        if: env.BACKUP_S3_BUCKET != ''
        env:
          BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION || 'us-east-1' }}
        run: |
          pip install awscli --quiet
          aws s3 cp "${BACKUP_FILE}" "s3://${BACKUP_S3_BUCKET}/backups/${BACKUP_FILE}"
          echo "☁️  Uploaded to s3://${BACKUP_S3_BUCKET}/backups/${BACKUP_FILE}"

  # ── Pre-scrape housekeeping (reap stuck runs) ──────────
  pre-scrape-cleanup:
    if: >-
      github.event.schedule == '0 6 * * *' ||
      github.event.schedule == '30 6 * * *' ||
      github.event.schedule == '0 7 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Reap stuck RUNNING records
        run: |
          npm install pg --no-save --silent 2>/dev/null
          node -e "
            const pg = require('pg');
            const pool = new pg.Pool({ connectionString: process.env.DATABASE_URL });
            pool.query(
              \"UPDATE scrape_runs SET status = 'FAILED', finished_at = NOW(), error_summary = 'Auto-reaped: stuck in RUNNING state' WHERE status = 'RUNNING' AND started_at < NOW() - INTERVAL '4 hours' RETURNING id, pipeline, started_at\"
            ).then(r => {
              if (r.rows.length === 0) console.log('✅ No stuck runs to reap');
              else {
                console.log('🧹 Reaped ' + r.rows.length + ' stuck runs:');
                r.rows.forEach(row => console.log('  ' + row.pipeline + ' — started ' + row.started_at.toISOString()));
              }
              pool.end();
            }).catch(e => { console.error(e); pool.end(); process.exit(1); });
          "

  # ── Shelter Scrapers (1x/day) ─────────────────────────
  scrape-shelters:
    if: >-
      github.event.schedule == '0 6 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'shelters'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm run scrape -- --no-cv

  # ── RescueGroups (1x/day) ────────────────────────────
  scrape-rescuegroups:
    if: >-
      github.event.schedule == '0 6 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'rescuegroups'))
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npx tsx scraper/run-rescuegroups.ts --no-cv

  # ── Petfinder (1x/day, 4 parallel shards) ──────────
  scrape-petfinder:
    if: >-
      github.event.schedule == '0 6 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'petfinder'))
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npx tsx scraper/run-petfinder.ts --shard=${{ matrix.shard }} --total-shards=4 --no-cv

  # ── Petango / 24PetConnect (1x/day) ────────────────
  scrape-petango:
    if: >-
      github.event.schedule == '30 6 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'petango'))
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npx tsx scraper/run-petango.ts --shard=${{ matrix.shard }} --total-shards=4 --no-cv

  # ── Socrata Listings (weekly — open data portals update infrequently) ──
  scrape-socrata-listings:
    if: >-
      github.event.schedule == '0 4 * * 0' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'socrata-listings'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npx tsx scraper/run-socrata-listings.ts --no-cv

  # ── ShelterLuv (1x/day) ─────────────────────────────
  scrape-shelterluv:
    if: >-
      github.event.schedule == '30 6 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'shelterluv'))
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npx tsx scraper/run-shelterluv.ts --shard=${{ matrix.shard }} --total-shards=4 --no-cv

  # ── Adopt-a-Pet (1x/day, 4 parallel shards) ────────
  scrape-adoptapet:
    if: >-
      github.event.schedule == '0 7 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'adoptapet'))
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npx tsx scraper/run-adoptapet.ts --shard=${{ matrix.shard }} --total-shards=4 --no-cv

  # ── Open Data Stats (weekly) ────────────────────────────
  scrape-stats:
    if: >-
      github.event.schedule == '0 4 * * 0' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'opendata' ||
        github.event.inputs.pipeline == 'news-busts'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm run scrape:opendata
      # Confiscation events ride the same weekly cron (lightweight, ~30s)
      - run: npm run scrape:confiscation
      # News busts: Google News RSS for cruelty cases ($0/run)
      - run: npm run scrape:news-busts

  # ── Monthly: State Reports (1st of month, single runner) ──
  # 13 state scrapers run sequentially on one runner instead of
  # 13 parallel runners. Saves ~12 cold starts (∼36 min/month).
  scrape-state-reports:
    if: >-
      github.event.schedule == '0 5 1 * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'state-reports' ||
        github.event.inputs.pipeline == 'new-jersey' ||
        github.event.inputs.pipeline == 'connecticut' ||
        github.event.inputs.pipeline == 'maryland' ||
        github.event.inputs.pipeline == 'michigan' ||
        github.event.inputs.pipeline == 'south-carolina' ||
        github.event.inputs.pipeline == 'illinois' ||
        github.event.inputs.pipeline == 'missouri' ||
        github.event.inputs.pipeline == 'oregon' ||
        github.event.inputs.pipeline == 'florida' ||
        github.event.inputs.pipeline == 'georgia' ||
        github.event.inputs.pipeline == 'virginia' ||
        github.event.inputs.pipeline == 'colorado' ||
        github.event.inputs.pipeline == 'north-carolina'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run state report scrapers
        run: |
          PIPE="${{ github.event.inputs.pipeline }}"
          run_if() { [[ -z "$PIPE" || "$PIPE" == 'all' || "$PIPE" == 'state-reports' || "$PIPE" == "$1" ]]; }
          FAILED=""
          run_scraper() {
            local name="$1"; shift
            if run_if "$name"; then
              if "$@"; then
                echo "✅ $name" >> "$GITHUB_STEP_SUMMARY"
              else
                echo "❌ $name" >> "$GITHUB_STEP_SUMMARY"
                FAILED="$FAILED $name"
              fi
            fi
          }
          run_scraper new-jersey       npm run scrape:new-jersey
          run_scraper connecticut      npm run scrape:connecticut
          run_scraper maryland         npm run scrape:maryland
          run_scraper michigan         npm run scrape:michigan
          run_scraper south-carolina   npm run scrape:south-carolina
          run_scraper illinois         npm run scrape:illinois
          run_scraper missouri         npm run scrape:missouri
          run_scraper oregon           npm run scrape:oregon
          run_scraper florida          npm run scrape:florida
          run_scraper georgia          npm run scrape:georgia
          run_scraper virginia         npm run scrape:virginia
          run_scraper colorado         npm run scrape:colorado
          run_scraper north-carolina   npm run scrape:north-carolina
          if [[ -n "$FAILED" ]]; then
            echo "::error::Failed pipelines:$FAILED"
            exit 1
          fi

  # ── Monthly: USDA Pipeline (single runner) ──────────────
  scrape-usda:
    if: >-
      github.event.schedule == '0 5 1 * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'aphis' ||
        github.event.inputs.pipeline == 'aphis-enforcement' ||
        github.event.inputs.pipeline == 'state-kennel'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run USDA scrapers
        run: |
          PIPE="${{ github.event.inputs.pipeline }}"
          run_if() { [[ -z "$PIPE" || "$PIPE" == 'all' || "$PIPE" == "$1" ]]; }
          FAILED=""
          run_scraper() {
            local name="$1"; shift
            if run_if "$name"; then
              if "$@"; then
                echo "✅ $name" >> "$GITHUB_STEP_SUMMARY"
              else
                echo "❌ $name" >> "$GITHUB_STEP_SUMMARY"
                FAILED="$FAILED $name"
              fi
            fi
          }
          run_scraper aphis             npm run scrape:aphis
          run_scraper aphis-enforcement  npm run scrape:aphis-enforcement
          run_scraper state-kennel      npm run scrape:state-kennel
          if [[ -n "$FAILED" ]]; then
            echo "::error::Failed pipelines:$FAILED"
            exit 1
          fi

  # ── Monthly: Data Utilities (single runner) ─────────────
  scrape-data-utils:
    if: >-
      github.event.schedule == '0 5 1 * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'all' ||
        github.event.inputs.pipeline == 'data-utils' ||
        github.event.inputs.pipeline == 'breeds' ||
        github.event.inputs.pipeline == 'shelter-stats' ||
        github.event.inputs.pipeline == '990' ||
        github.event.inputs.pipeline == 'aldf' ||
        github.event.inputs.pipeline == 'geocode' ||
        github.event.inputs.pipeline == 'enrich' ||
        github.event.inputs.pipeline == 'shelter-intake' ||
        github.event.inputs.pipeline == 'cruelty-registry'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run data utility scrapers
        run: |
          PIPE="${{ github.event.inputs.pipeline }}"
          run_if() { [[ -z "$PIPE" || "$PIPE" == 'all' || "$PIPE" == "$1" ]]; }
          FAILED=""
          run_scraper() {
            local name="$1"; shift
            if run_if "$name"; then
              if "$@"; then
                echo "✅ $name" >> "$GITHUB_STEP_SUMMARY"
              else
                echo "❌ $name" >> "$GITHUB_STEP_SUMMARY"
                FAILED="$FAILED $name"
              fi
            fi
          }
          run_scraper breeds          npm run scrape:breeds
          run_scraper shelter-stats   npm run scrape:shelter-stats
          run_scraper 990             npm run scrape:990
          run_scraper aldf            npm run scrape:aldf
          run_scraper geocode         npm run geocode
          run_scraper enrich          npm run enrich
          run_scraper shelter-intake  npm run scrape:shelter-intake
          run_scraper cruelty-registry npm run scrape:cruelty-registry
          if [[ -n "$FAILED" ]]; then
            echo "::error::Failed pipelines:$FAILED"
            exit 1
          fi


  # ── Annual: Reports & Watchlists (Jan 15) ───────────────
  scrape-annual:
    if: >-
      github.event.schedule == '0 6 15 1 *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'best-friends' ||
        github.event.inputs.pipeline == 'research' ||
        github.event.inputs.pipeline == 'horrible-hundred' ||
        github.event.inputs.pipeline == 'lab-retirement' ||
        github.event.inputs.pipeline == 'annual'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: best-friends
            cmd: npm run scrape:best-friends
            needs-playwright: true
          - name: research
            cmd: npm run scrape:research
          - name: horrible-hundred
            cmd: npm run scrape:horrible-hundred
          - name: lab-retirement
            cmd: npm run scrape:lab-retirement
          - name: puppy-imports
            cmd: npm run scrape:puppy-imports
          - name: pet-store-bans
            cmd: npm run scrape:pet-store-bans
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          install-playwright: ${{ matrix.needs-playwright || 'false' }}
      - name: Run ${{ matrix.name }}
        if: >-
          github.event.schedule == '0 6 15 1 *' ||
          github.event.inputs.pipeline == 'annual' ||
          github.event.inputs.pipeline == matrix.name
        run: ${{ matrix.cmd }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Annual scraper '${{ matrix.name }}' failed. Next auto-run is Jan 15 next year."
          echo "❌ **${{ matrix.name }}** failed" >> "$GITHUB_STEP_SUMMARY"
          echo "Rerun manually: Actions → Scrape → Run workflow → pipeline: ${{ matrix.name }}" >> "$GITHUB_STEP_SUMMARY"

  # ── CV Assessment (after all scrape jobs) ─────────────
  run-cv:
    needs: [scrape-shelters, scrape-rescuegroups, scrape-petfinder, scrape-petango, scrape-shelterluv, scrape-adoptapet]
    if: always() && github.event.schedule == '0 7 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          install-python: 'true'
      - run: npx tsx scraper/run-cv.ts --limit=10000

  # ── Retry Queue (after all scrape jobs) ──────────────
  retry-queue:
    needs: [scrape-shelters, scrape-rescuegroups, scrape-petfinder, scrape-petango, scrape-shelterluv, scrape-adoptapet]
    if: always() && github.event.schedule == '0 7 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npx tsx scraper/run-retry.ts

  # ── Cross-Source Dedup (after CV, daily) ─────────────
  # Merges duplicate animal records across scrapers (same shelter,
  # different source IDs). Only auto-merges when photo hash confirms
  # visual similarity. Runs after CV so photo hashes are populated.
  cross-source-dedup:
    needs: [run-cv, retry-queue]
    if: always() && github.event.schedule == '0 7 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npx tsx scripts/dedup-cross-source.ts --execute

